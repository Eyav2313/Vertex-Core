terminal_input console
set pager=0

if loadfont /boot/grub/fonts/vertex-boot.pf2; then
    insmod all_video
    insmod gfxterm
    set gfxmode=1280x720,1024x768,auto
    set gfxpayload=keep
    terminal_output gfxterm
else
    set gfxpayload=keep
    terminal_output console
fi

set color_normal=light-gray/black
set color_highlight=white/black
set vertex_common_args="root=LABEL=VertexLiveRoot rw console=tty0 loglevel=4 systemd.show_status=1 systemd.log_level=info vt.global_cursor_default=0 fbcon=font:TER16x32 video=1920x1080 systemd.unit=multi-user.target systemd.mask=systemd-udev-settle.service"

function draw_vertex_menu {
    clear
    echo ""
    echo "      Vertex"
    echo "      Developed by Nuren Zarif Haque"
    echo ""
    echo "      BOOT MANAGER"
    echo "      UEFI live media  |  amd64  |  Linux LTS"
    echo ""
    echo "      >  Start Vertex"
    echo ""
    echo "         Start Vertex (safe graphics)"
    echo ""
    echo "         Diagnostics"
    echo ""
    echo "         Restart PC"
    echo ""
    echo "         Shutdown PC"
    echo ""
    echo "         Exit to UEFI"
    echo ""
    echo "      Status   Ready"
    echo "      Input    1-6 select, Enter boots default"
    echo ""
    echo "      _"
}

function boot_vertex {
    clear
    echo ""
    echo "      Vertex"
    echo "      Developed by Nuren Zarif Haque"
    echo ""
    echo "      [firmware] UEFI handoff complete"
    echo "      [loader]   locating live media"
    echo "      [loader]   root filesystem: LABEL=VertexLiveRoot"
    echo "      [loader]   loading Linux kernel image"
    linux /boot/vertex/vmlinuz ${vertex_common_args}
    echo "      [loader]   loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    echo "      [loader]   transferring control to Linux"
    echo "      _"
    boot
}

function boot_vertex_safe {
    clear
    echo ""
    echo "      Vertex"
    echo "      Developed by Nuren Zarif Haque"
    echo ""
    echo "      [firmware] UEFI handoff complete"
    echo "      [loader]   locating live media"
    echo "      [loader]   root filesystem: LABEL=VertexLiveRoot"
    echo "      [loader]   loading Linux kernel image"
    linux /boot/vertex/vmlinuz ${vertex_common_args} nomodeset xforcevesa
    echo "      [loader]   loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    echo "      [loader]   transferring control to Linux"
    echo "      _"
    boot
}

function boot_vertex_diagnostics {
    clear
    echo ""
    echo "      Vertex"
    echo "      Developed by Nuren Zarif Haque"
    echo ""
    echo "      [firmware] UEFI handoff complete"
    echo "      [loader]   loading diagnostics target"
    linux /boot/vertex/vmlinuz root=LABEL=VertexLiveRoot rw console=tty0 loglevel=5 systemd.show_status=1 systemd.unit=rescue.target vt.global_cursor_default=1 fbcon=font:TER16x32
    echo "      [loader]   loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    echo "      [loader]   transferring control to Linux"
    echo "      _"
    boot
}

draw_vertex_menu
echo "      Booting default entry in 7 seconds. Press any key for choices."

if sleep --interruptible 7; then
    boot_vertex
fi

draw_vertex_menu
echo "      1  Start Vertex"
echo "      2  Start Vertex (safe graphics)"
echo "      3  Diagnostics"
echo "      4  Restart PC"
echo "      5  Shutdown PC"
echo "      6  Exit to UEFI"
echo ""
echo -n "      Select option: _"
read vertex_choice

if [ "$vertex_choice" = "2" ]; then
    boot_vertex_safe
elif [ "$vertex_choice" = "3" ]; then
    boot_vertex_diagnostics
elif [ "$vertex_choice" = "4" ]; then
    reboot
elif [ "$vertex_choice" = "5" ]; then
    halt
elif [ "$vertex_choice" = "6" ]; then
    fwsetup
else
    boot_vertex
fi
