terminal_input console
terminal_output console
set pager=0
set gfxpayload=keep

set vertex_common_args="root=LABEL=VertexLiveRoot rw console=tty0 loglevel=4 systemd.show_status=1 systemd.log_level=info vt.global_cursor_default=0 fbcon=font:VGA8x16 video=1920x1080 systemd.unit=multi-user.target systemd.mask=systemd-udev-settle.service"

function draw_vertex_menu {
    clear
    echo "VERTEX BOOT MANAGER"
    echo "UEFI LIVE MEDIA - Nuren Zarif Haque"
    echo ""
    echo "  Start Vertex OS"
    echo "> Start Vertex OS (safe graphics)"
    echo "  Diagnostics"
    echo "  Restart PC"
    echo "  Shutdown PC"
    echo "  Exit to UEFI"
    echo ""
    echo "Boot CLI without the graphics logo step."
    echo ""
    echo "Use Up/Down or number keys. Enter = select. Esc = exit."
}

function vertex_boot_log_common {
    clear
    sleep 1
    echo "[firmware] UEFI handoff complete"
    sleep 1
    echo "[loader] locating live media"
    sleep 1
    echo "[loader] root filesystem: LABEL=VertexLiveRoot"
    sleep 1
    echo "[loader] loading Linux kernel image"
}

function boot_vertex {
    vertex_boot_log_common
    linux /boot/vertex/vmlinuz ${vertex_common_args}
    sleep 1
    echo "[loader] loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    sleep 1
    echo "[loader] transferring control to Linux"
    sleep 1
    echo "[    OK    ] Mounted root filesystem"
    sleep 1
    echo "[    OK    ] Started system logger"
    sleep 1
    echo "[    OK    ] Started network manager"
    sleep 1
    echo "[    OK    ] Started display manager"
    sleep 1
    echo "[    OK    ] Reached graphical target"
    sleep 1
    boot
}

function boot_vertex_safe {
    vertex_boot_log_common
    linux /boot/vertex/vmlinuz ${vertex_common_args} nomodeset xforcevesa
    sleep 1
    echo "[loader] loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    sleep 1
    echo "[loader] transferring control to Linux"
    sleep 1
    echo "[    OK    ] Mounted root filesystem"
    sleep 1
    echo "[    OK    ] Started system logger"
    sleep 1
    echo "[    OK    ] Started network manager"
    sleep 1
    echo "[    OK    ] Started display manager"
    sleep 1
    echo "[    OK    ] Reached graphical target"
    sleep 1
    boot
}

function boot_vertex_diagnostics {
    clear
    sleep 1
    echo "[firmware] UEFI handoff complete"
    sleep 1
    echo "[loader] loading diagnostics target"
    linux /boot/vertex/vmlinuz root=LABEL=VertexLiveRoot rw console=tty0 loglevel=5 systemd.show_status=1 systemd.unit=rescue.target vt.global_cursor_default=1 fbcon=font:VGA8x16
    sleep 1
    echo "[loader] loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    sleep 1
    echo "[loader] transferring control to Linux"
    sleep 1
    boot
}

draw_vertex_menu

if sleep --interruptible 7; then
    boot_vertex_safe
fi

draw_vertex_menu
echo ""
echo -n "Select option: "
read vertex_choice

if [ "$vertex_choice" = "1" ]; then
    boot_vertex
elif [ "$vertex_choice" = "3" ]; then
    boot_vertex_diagnostics
elif [ "$vertex_choice" = "4" ]; then
    reboot
elif [ "$vertex_choice" = "5" ]; then
    halt
elif [ "$vertex_choice" = "6" ]; then
    fwsetup
else
    boot_vertex_safe
fi
