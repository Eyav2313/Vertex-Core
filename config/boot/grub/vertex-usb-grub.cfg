insmod all_video
insmod font
insmod gfxterm
insmod gfxmenu
insmod png
insmod part_gpt
insmod fat
insmod ext2
insmod search
insmod search_label
insmod linux
insmod gzio

set gfxmode=1280x720,1024x768,auto
set gfxpayload=keep
terminal_input console

if loadfont /boot/grub/fonts/unicode.pf2; then
    terminal_output gfxterm
    set theme=/boot/grub/themes/vertex/theme.txt
    export theme
else
    terminal_output console
fi

set pager=0
set timeout_style=menu
set timeout=-1
set default=0
set color_normal=dark-gray/black
set color_highlight=white/black
set menu_color_normal=dark-gray/black
set menu_color_highlight=white/black

set vertex_common_args="root=LABEL=VertexLiveRoot rw console=tty0 console=ttyS0,115200n8 loglevel=4 systemd.show_status=1 systemd.log_level=info vt.global_cursor_default=1 fbcon=font:VGA8x16 video=1920x1080 systemd.unit=multi-user.target systemd.mask=systemd-udev-settle.service"

function vertex_header {
    clear
    set color_normal=white/black
    echo "VERTEX BOOT MANAGER"
    set color_normal=dark-gray/black
    echo "UEFI LIVE MEDIA - Nuren Zarif Haque"
    echo ""
}

function vertex_boot_log_common {
    vertex_header
    sleep 1
    echo "[firmware] UEFI handoff complete"
    sleep 1
    echo "[loader] locating live media"
    sleep 1
    echo "[loader] root filesystem: LABEL=VertexLiveRoot"
    sleep 1
    echo "[loader] loading Linux kernel image"
}

function vertex_boot_status {
    sleep 1
    set color_normal=light-gray/black
    echo "[    OK    ] Mounted root filesystem"
    sleep 1
    echo "[    OK    ] Started system logger"
    sleep 1
    echo "[    OK    ] Started network manager"
    sleep 1
    echo "[    OK    ] Started display manager"
    sleep 1
    echo "[    OK    ] Reached graphical target"
    sleep 1
}

function boot_vertex {
    vertex_boot_log_common
    linux /boot/vertex/vmlinuz ${vertex_common_args}
    sleep 1
    set color_normal=dark-gray/black
    echo "[loader] loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    sleep 1
    echo "[loader] transferring control to Linux"
    vertex_boot_status
    boot
}

function boot_vertex_safe {
    vertex_boot_log_common
    linux /boot/vertex/vmlinuz ${vertex_common_args} nomodeset xforcevesa
    sleep 1
    set color_normal=dark-gray/black
    echo "[loader] loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    sleep 1
    echo "[loader] transferring control to Linux"
    vertex_boot_status
    boot
}

function boot_vertex_diagnostics {
    vertex_header
    sleep 1
    echo "[firmware] UEFI handoff complete"
    sleep 1
    echo "[loader] loading diagnostics target"
    linux /boot/vertex/vmlinuz root=LABEL=VertexLiveRoot rw console=tty0 console=ttyS0,115200n8 loglevel=5 systemd.show_status=1 systemd.unit=rescue.target vt.global_cursor_default=1 fbcon=font:VGA8x16
    sleep 1
    echo "[loader] loading initial ramdisk"
    initrd /boot/vertex/initrd.img
    sleep 1
    echo "[loader] transferring control to Linux"
    sleep 1
    boot
}

menuentry "Start Vertex OS" --hotkey=1 {
    boot_vertex
}

menuentry "Start Vertex OS (safe graphics)" --hotkey=2 {
    boot_vertex_safe
}

menuentry "Diagnostics" --hotkey=3 {
    boot_vertex_diagnostics
}

menuentry "Restart PC" --hotkey=4 {
    reboot
}

menuentry "Shutdown PC" --hotkey=5 {
    halt
}

menuentry "Exit to UEFI" --hotkey=6 {
    fwsetup
}
