set gfxpayload=keep
terminal_input console
terminal_output console
set pager=0

set vertex_common_args="root=LABEL=VertexLiveRoot rw console=tty0 loglevel=4 systemd.show_status=1 systemd.log_level=info vt.global_cursor_default=0 fbcon=font:VGA8x8 video=1920x1080 systemd.unit=multi-user.target systemd.mask=systemd-udev-settle.service"

function draw_vertex_menu {
    clear
    echo "VERTEX BOOT MANAGER"
    echo "UEFI LIVE MEDIA - Nuren Zarif Haque"
    echo ""
    echo "> Start Vertex"
    echo "  Start Vertex (safe graphics)"
    echo "  Diagnostics"
    echo "  Restart PC"
    echo "  Shutdown PC"
    echo "  Exit to UEFI"
    echo ""
    echo "Boot Vertex with the default graphics path."
    echo ""
    echo "Use number keys. Enter = select. Esc = advanced menu."
    echo ""
}

function boot_vertex {
    clear
    echo "Loading Linux kernel..."
    linux /boot/vertex/vmlinuz ${vertex_common_args}
    echo "Loading initial ramdisk..."
    initrd /boot/vertex/initrd.img
    boot
}

function boot_vertex_safe {
    clear
    echo "Loading Linux kernel..."
    linux /boot/vertex/vmlinuz ${vertex_common_args} nomodeset xforcevesa
    echo "Loading initial ramdisk..."
    initrd /boot/vertex/initrd.img
    boot
}

function boot_vertex_diagnostics {
    clear
    echo "Loading diagnostics target..."
    linux /boot/vertex/vmlinuz root=LABEL=VertexLiveRoot rw console=tty0 loglevel=5 systemd.show_status=1 systemd.unit=rescue.target vt.global_cursor_default=1 fbcon=font:VGA8x8
    echo "Loading initial ramdisk..."
    initrd /boot/vertex/initrd.img
    boot
}

draw_vertex_menu
echo "Starting Vertex automatically in 7 seconds. Press any key for choices."

if sleep --interruptible 7; then
    boot_vertex
fi

draw_vertex_menu
echo "1 Start Vertex"
echo "2 Start Vertex (safe graphics)"
echo "3 Diagnostics"
echo "4 Restart PC"
echo "5 Shutdown PC"
echo "6 Exit to UEFI"
echo ""
echo -n "Select option: "
read vertex_choice

if [ "$vertex_choice" = "2" ]; then
    boot_vertex_safe
elif [ "$vertex_choice" = "3" ]; then
    boot_vertex_diagnostics
elif [ "$vertex_choice" = "4" ]; then
    reboot
elif [ "$vertex_choice" = "5" ]; then
    halt
elif [ "$vertex_choice" = "6" ]; then
    fwsetup
else
    boot_vertex
fi
