# Vertex lock screen for Hyprlock.
# Mirrors preview/desktop/index.html for the actual Hyprland session lock.

general {
    disable_loading_bar = false
    hide_cursor = false
    grace = 0
}

background {
    monitor =
    path = /usr/share/vertex/wallpapers/vertex-lock-background.png
    color = rgba(000000ff)
    blur_passes = 3
    blur_size = 8
    brightness = 0.62
    contrast = 1.05
    vibrancy = 0.16
}

shape {
    monitor =
    size = 160, 36
    color = rgba(000000ff)
    rounding = 20
    border_size = 1
    border_color = rgba(ffffff1a)
    position = 0, -12
    halign = center
    valign = top
}

label {
    monitor =
    text = LOCK
    color = rgba(ffffffff)
    font_size = 10
    font_family = Inter
    position = -56, -23
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %b %-d"
    color = rgba(ffffffff)
    font_size = 24
    font_family = Inter
    position = 0, 330
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(ffffffff)
    font_size = 150
    font_family = Inter
    position = 0, 220
    halign = center
    valign = center
}

image {
    monitor =
    path = /usr/share/vertex/branding/vertex-logo.png
    size = 78
    rounding = -1
    border_size = 1
    border_color = rgba(ffffff1a)
    position = 0, -18
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 318, 52
    outline_thickness = 1
    dots_size = 0.24
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(ffffff1a)
    inner_color = rgba(ffffff26)
    font_color = rgba(ffffffff)
    fade_on_empty = false
    placeholder_text = Password
    hide_input = false
    rounding = 26
    check_color = rgba(76f7b240)
    fail_color = rgba(ff4d4d33)
    fail_text = Access denied
    capslock_color = rgba(ffd16640)
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = Type password to unlock
    color = rgba(ffffffb3)
    font_size = 13
    font_family = Inter
    position = 0, 50
    halign = center
    valign = bottom
}

shape {
    monitor =
    size = 130, 5
    color = rgba(ffffff55)
    rounding = 3
    position = 0, 25
    halign = center
    valign = bottom
}
