# Vertex OS Hyprland profile.
# Copy to /etc/skel/.config/hypr/hyprland.conf or package as vertex-hyprland-profile.

env = XDG_CURRENT_DESKTOP,Vertex
env = XDG_SESSION_DESKTOP,Vertex
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

monitor = ,preferred,auto,1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 1
    col.active_border = rgba(69d2ffee)
    col.inactive_border = rgba(ffffff22)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 14

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.16
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }
}

animations {
    enabled = true
    bezier = vertexEase, 0.22, 1.0, 0.36, 1.0
    animation = windows, 1, 5, vertexEase, popin 88%
    animation = border, 1, 4, vertexEase
    animation = fade, 1, 4, vertexEase
    animation = workspaces, 1, 4, vertexEase, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    animate_manual_resizes = false
    focus_on_activate = true
}

windowrulev2 = opacity 0.92 0.86,class:^(Alacritty)$
windowrulev2 = opacity 0.94 0.88,class:^(org.wezfurlong.wezterm)$
windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = size 720 520,class:^(pavucontrol)$

$mod = SUPER
$terminal = alacritty --config-file ~/.config/alacritty/vertex.toml
$launcher = wofi --show drun --allow-images

bind = $mod, Return, exec, $terminal
bind = $mod, Space, exec, $launcher
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, Escape, exec, loginctl lock-session

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

exec-once = waybar
exec-once = mako
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
