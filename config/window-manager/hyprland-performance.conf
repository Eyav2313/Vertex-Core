# Vertex OS Hyprland performance profile.
# Fast default: opaque windows, no blur, no shadow, no compositor-heavy effects.

general {
    border_size = 1
    gaps_in = 4
    gaps_out = 8

    col.active_border = rgba(76f7b2ff)
    col.inactive_border = rgba(ffffff18)
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    drop_shadow = false

    blur {
        enabled = false
        size = 3
        passes = 1
        new_optimizations = true
    }
}

animations {
    enabled = false
}

misc {
    vfr = true
    vrr = 1
    animate_manual_resizes = false
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
