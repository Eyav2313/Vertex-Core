<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex Lock Screen | Zarif</title>
    <style>
        @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 200; font-display: swap; src: url('../../assets/fonts/manrope/Manrope-ExtraLight.ttf') format('truetype'); }
        @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 300; font-display: swap; src: url('../../assets/fonts/manrope/Manrope-Light.ttf') format('truetype'); }
        @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 400; font-display: swap; src: url('../../assets/fonts/manrope/Manrope-Regular.ttf') format('truetype'); }
        @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 700; font-display: swap; src: url('../../assets/fonts/manrope/Manrope-Bold.ttf') format('truetype'); }
        @font-face { font-family: 'Vertex Clock'; font-style: normal; font-weight: 300 700; font-display: swap; src: url('../../assets/fonts/space-grotesk/SpaceGrotesk-Variable.ttf') format('truetype'); }
        @font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 300 700; font-display: swap; src: url('../../assets/fonts/space-grotesk/SpaceGrotesk-Variable.ttf') format('truetype'); }
        @font-face { font-family: 'SF Pro Display'; font-style: normal; font-weight: 200; font-display: swap; src: url('../../assets/fonts/sf-pro-display/SFPRODISPLAYREGULAR.OTF') format('opentype'); }
        @font-face { font-family: 'SF Pro Display'; font-style: normal; font-weight: 300; font-display: swap; src: url('../../assets/fonts/sf-pro-display/SFPRODISPLAYREGULAR.OTF') format('opentype'); }
        @font-face { font-family: 'SF Pro Display'; font-style: normal; font-weight: 400; font-display: swap; src: url('../../assets/fonts/sf-pro-display/SFPRODISPLAYREGULAR.OTF') format('opentype'); }
        @font-face { font-family: 'SF Pro Display'; font-style: normal; font-weight: 500; font-display: swap; src: url('../../assets/fonts/sf-pro-display/SFPRODISPLAYMEDIUM.OTF') format('opentype'); }
        @font-face { font-family: 'SF Pro Display'; font-style: normal; font-weight: 700; font-display: swap; src: url('../../assets/fonts/sf-pro-display/SFPRODISPLAYBOLD.OTF') format('opentype'); }
        :root { 
            --font: 'Manrope', 'Inter', 'Outfit', sans-serif;
            --accent: #fff; 
            --bg: url('../../assets/wallpapers/vertex-lock-background.png'); 
            --f-size: clamp(6rem, 24vw, 10rem);
            --time-opacity: 1;
            --cursor-default: url('../../assets/cursors/vertex-arrow.png') 1 1, auto;
            --cursor-pointer: url('../../assets/cursors/vertex-hand.png') 11 2, pointer;
            --cursor-input: url('../../assets/cursors/vertex-input.png') 10 12, text;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100vh; overflow: hidden; background: #000; font-family: var(--font); color: white; }

        /* --- BOOT SCREEN --- */
        @property --logo-shine-stop {
            syntax: '<percentage>';
            inherits: false;
            initial-value: 0%;
        }
        #boot-screen { position: fixed; inset: 0; z-index: 10000; overflow: hidden; background: #000; cursor: none; transition: opacity 0.5s ease-out; }
        .loading-stage { position: absolute; inset: 0; display: grid; place-items: center; }
        .boot-logo { position: relative; width: 88px; height: 88px; opacity: 0; display: grid; place-items: center; isolation: isolate; transition: opacity 0.5s ease-out; }
        .vertex-logo { width: 88px; height: 88px; object-fit: contain; }
        #boot-screen.logo-phase .boot-logo { opacity: 1; }
        .boot-logo::after { --logo-shine-stop: 0%; content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom right, transparent calc(var(--logo-shine-stop) - 15%), rgba(255,255,255,0.6) var(--logo-shine-stop), transparent calc(var(--logo-shine-stop) + 15%)); -webkit-mask: url('../../assets/branding/vertex-logo.png') center / contain no-repeat; mask: url('../../assets/branding/vertex-logo.png') center / contain no-repeat; opacity: 0; pointer-events: none; }
        #boot-screen.logo-phase .boot-logo::after { animation: logoShine 2s linear infinite; opacity: 1; }
        .loading-spinner { position: absolute; left: 50%; bottom: 80px; width: 30px; height: 30px; margin-left: -15px; border-radius: 50%; border: 2px solid rgba(96,96,96,0.2); border-top-color: #606060; opacity: 0; animation: spinnerRotate 0.85s linear infinite; transition: opacity 0.5s ease-out; }
        #boot-screen.spinner-phase .loading-spinner { opacity: 1; }
        @keyframes logoShine {
            from { --logo-shine-stop: 0%; }
            to { --logo-shine-stop: 100%; }
        }
        @keyframes spinnerRotate { to { transform: rotate(360deg); } }

        /* --- BACKGROUND --- */
        #wp-cont { position: absolute; inset: 0; background: var(--bg) center/cover; transition: opacity 1.05s ease-out, filter 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); transform: scale(1.08); filter: blur(34px) brightness(0.78); opacity: 0; cursor: var(--cursor-default); }
        body.lock-ready, body.lock-ready #wp-cont, body.lock-ready #wp-cont * { cursor: var(--cursor-default); }
        button, .chip, .slider, input[type="range"], [onclick] { cursor: var(--cursor-pointer) !important; }
        input:not([type="range"]), textarea, [contenteditable="true"] { cursor: var(--cursor-input) !important; }
        .wp-ready { filter: blur(0px) !important; opacity: 1 !important; transform: scale(1) !important; }
        .wp-lock-blur { filter: blur(18px) brightness(0.68) !important; transform: scale(1.02) !important; }
        body.accessibility-boost #wp-cont { filter: contrast(1.08) brightness(0.94); }
        body.accessibility-boost #time-text { color: rgba(255,255,255,0.9); text-shadow: 0 2px 10px rgba(0,0,0,0.3), 0 0 16px rgba(255,255,255,0.06); }
        html.preview-capture #boot-screen { display: none; }
        html.preview-capture #wp-cont { filter: blur(0px) !important; opacity: 1 !important; transform: scale(1) !important; }

        /* --- SYSTEM WIDGETS --- */
        .system-widgets { z-index: 30; display: flex; align-items: center; justify-content: center; gap: 16px; opacity: 0; transform: translateY(6px); transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        body.lock-ready .system-widgets { opacity: 1; transform: translateY(0); }
        .widget-icon { width: 24px; height: 24px; border: 0; display: grid; place-items: center; color: rgba(255,255,255,0.62); background: transparent; padding: 0; transition: transform 0.22s ease, color 0.22s ease; }
        .widget-icon:hover, .widget-icon.active { transform: translateY(-1px); color: rgba(255,255,255,0.9); }
        .widget-icon svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 1.55; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .battery-widget { width: 30px; }
        .battery-body { width: 21px; height: 10px; border: 1.35px solid currentColor; border-radius: 3px; padding: 2px; position: relative; opacity: 0.94; }
        .battery-body::after { content: ""; position: absolute; right: -4px; top: 3px; width: 2px; height: 4px; border-radius: 1px; background: currentColor; }
        .battery-fill { display: block; width: var(--battery-level, 72%); height: 100%; border-radius: 1.5px; background: currentColor; }

        /* --- CLOCK --- */
        .lock-indicator { position: relative; width: fit-content; margin: 10vh auto 0; padding: 10px 18px 12px; text-align: center; pointer-events: none; transition: 0.6s; z-index: 10; opacity: var(--time-opacity); }
        .lock-indicator::before { content: ""; position: absolute; inset: -18px -34px -16px; z-index: -1; background: radial-gradient(ellipse at center, rgba(7,10,16,0.24), rgba(7,10,16,0.08) 44%, transparent 72%); opacity: 0.72; pointer-events: none; }
        #date-text { font-family: 'Manrope', sans-serif; font-size: clamp(0.78rem, 1.18vw, 0.9rem); font-weight: 300; letter-spacing: 0.24px; color: rgba(199,203,212,0.74); margin-bottom: 2px; text-shadow: 0 2px 14px rgba(0,0,0,0.24); }
        #time-text { font-family: 'SF Pro Display', 'Vertex Clock', 'Space Grotesk', sans-serif; font-style: normal; font-weight: 360; font-size: clamp(4.55rem, 9.8vw, 6.05rem); color: rgba(255, 255, 255, 0.678); letter-spacing: 0.015em; line-height: 0.91; font-variant-numeric: lining-nums tabular-nums; font-feature-settings: "lnum" 1, "tnum" 1; -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision; text-shadow: 0 2px 8px rgba(0,0,0,0.16), 0 12px 28px rgba(0,0,0,0.18), 0 0 10px rgba(255,255,255,0.035); }
        /* --- BOTTOM UI --- */
        .bottom-shelf { position: absolute; bottom: 25px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .unlock-msg { font-family: var(--font); font-size: 0.85rem; font-weight: 300; opacity: 0; transform: translateY(10px); transition: 0.8s; color: rgba(255,255,255,0.7); }
        .msg-active { opacity: 1; transform: translateY(0); }
        .home-bar { width: 130px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; }

        /* --- HIGH TRANSPARENCY CUSTOMIZATION WINDOW --- */
        #custom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.28);
            display: flex; align-items: center; justify-content: center; 
            z-index: 9800; opacity: 0; visibility: hidden; transition: 0.42s ease; backdrop-filter: blur(10px);
        }
        #custom-overlay.active { opacity: 1; visibility: visible; }
        
        #custom-window {
            width: min(520px, calc(100vw - 32px)); max-height: min(82vh, 680px); overflow: hidden;
            background: rgba(15, 17, 22, 0.82); backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
            transform: scale(0.96) translateY(8px); transition: 0.42s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 28px 80px rgba(0,0,0,0.52); font-family: 'Manrope', sans-serif;
        }
        #custom-overlay.active #custom-window { transform: scale(1) translateY(0); }
        .window-titlebar { height: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 0 0 12px; background: rgba(255,255,255,0.035); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .window-titlebar span { font-size: 0.82rem; font-weight: 400; color: rgba(255,255,255,0.78); }
        .window-close { width: 46px; height: 34px; border: 0; background: transparent; color: rgba(255,255,255,0.58); display: grid; place-items: center; }
        .window-close:hover { background: rgba(232,17,35,0.82); color: white; }
        .window-close svg { width: 10px; height: 10px; stroke: currentColor; stroke-width: 1.5; }
        .custom-content { padding: 18px; overflow-y: auto; max-height: calc(min(82vh, 680px) - 34px); scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.28) transparent; }
        .custom-preview { position: relative; height: 170px; border-radius: 6px; overflow: hidden; background: var(--bg) center/cover; border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.035); }
        .custom-preview::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.34)); }
        .preview-clock { position: absolute; top: 18px; left: 0; right: 0; z-index: 1; text-align: center; opacity: var(--time-opacity); }
        .preview-date { font-size: 0.52rem; font-weight: 300; color: rgba(199,203,212,0.76); }
        .preview-time { font-family: 'SF Pro Display', 'Vertex Clock', 'Space Grotesk', sans-serif; font-size: 2.3rem; font-weight: 360; line-height: 0.92; color: rgba(255,255,255,0.72); letter-spacing: 0.02em; }
        .preview-bar { position: absolute; left: 50%; bottom: 14px; z-index: 1; width: 70px; height: 3px; border-radius: 2px; transform: translateX(-50%); background: rgba(255,255,255,0.28); }

        .section-header { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.11em; opacity: 0.58; margin: 18px 0 10px; text-transform: uppercase; }
        .chip-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
        .chip { padding: 8px 12px; background: rgba(255,255,255,0.075); border-radius: 6px; cursor: pointer; white-space: nowrap; font-size: 0.78rem; font-weight: 400; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.82); }
        .chip:hover { background: rgba(255,255,255,0.12); }
        
        /* Slider for Time Transparency */
        .slider { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; -webkit-appearance: none; cursor: pointer; margin: 10px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: white; border-radius: 50%; }

        /* --- PASSWORD ERROR --- */
        .pass-group { height: 42px; display: flex; align-items: center; background: rgba(255,255,255,0.065); padding: 5px 6px 5px 16px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 14px 38px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.035); backdrop-filter: blur(18px); transition: 0.3s; }
        #pass-in { width: 210px; height: 30px; border: 0; background: transparent; color: rgba(255,255,255,0.92); font-family: var(--font); font-size: 0.9rem; font-weight: 300; letter-spacing: 0.02em; }
        #pass-in::placeholder { color: rgba(255,255,255,0.46); }
        .submit-btn { width: 30px; height: 30px; border: 0; border-radius: 50%; display: grid; place-items: center; color: rgba(9,11,16,0.92); background: rgba(255,255,255,0.9); box-shadow: 0 8px 22px rgba(0,0,0,0.24), inset 0 -1px 0 rgba(0,0,0,0.08); transition: transform 0.22s ease, background 0.22s ease; }
        .submit-btn:hover { transform: translateX(1px) scale(1.03); background: #fff; }
        .submit-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2.1; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .error-shake { border-color: #ff4d4d !important; background: rgba(255, 77, 77, 0.2) !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        #login-module { position: fixed; inset: 0; z-index: 9500; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        #login-module.active { opacity: 1; visibility: visible; }
        @media (max-width: 720px) {
            .system-widgets { gap: 14px; }
            .widget-icon { width: 22px; height: 22px; }
            .battery-widget { width: 28px; }
            .lock-indicator { margin-top: 9.5vh; }
            #time-text { font-size: clamp(4.2rem, 19vw, 5.5rem); letter-spacing: 0.6px; }
            #date-text { font-size: 0.76rem; }
            #pass-in { width: 184px; }
        }
    </style>
    <script>
        if (new URLSearchParams(window.location.search).has('preview')) {
            document.documentElement.classList.add('preview-capture');
        }
    </script>
</head>
<body>

    <div id="boot-screen">
        <div class="loading-stage">
            <div class="boot-logo">
                <img class="vertex-logo" src="../../assets/branding/vertex-logo.png" alt="Vertex logo">
            </div>
        </div>
        <div class="loading-spinner" aria-hidden="true"></div>
    </div>

    <div id="wp-cont">
        <div class="lock-indicator" id="ui-main">
            <p id="date-text">Thursday, June 4</p>
            <h1 id="time-text">00:00</h1>
        </div>
        <div class="bottom-shelf">
            <div class="unlock-msg" id="hint-text">Click anywhere to unlock</div>
            <div class="system-widgets" aria-label="System controls">
                <button class="widget-icon" type="button" title="Accessibility" aria-label="Accessibility" onclick="toggleAccessibility(this)">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="4.5" r="1.8"></circle>
                        <path d="M5.6 8.2h12.8"></path>
                        <path d="M12 8.4v5.1"></path>
                        <path d="M8.5 20.5l3.5-7 3.5 7"></path>
                    </svg>
                </button>
                <button class="widget-icon battery-widget" type="button" title="Battery" aria-label="Battery status">
                    <span class="battery-body" aria-hidden="true"><span class="battery-fill" id="battery-fill"></span></span>
                </button>
            </div>
            <div class="home-bar"></div>
        </div>
    </div>

    <div id="custom-overlay">
        <div id="custom-window">
            <div class="window-titlebar">
                <span>Vertex Appearance</span>
                <button class="window-close" onclick="closePanel()" aria-label="Close">
                    <svg viewBox="0 0 10 10" aria-hidden="true"><path d="M2 2l6 6M8 2L2 8"></path></svg>
                </button>
            </div>
            <div class="custom-content">
                <div class="custom-preview">
                    <div class="preview-clock">
                        <div class="preview-date" id="preview-date">Thursday, June 4</div>
                        <div class="preview-time" id="preview-time">00:00</div>
                    </div>
                    <div class="preview-bar"></div>
                </div>

                <p class="section-header">Time Transparency</p>
                <input type="range" min="0.1" max="1" step="0.1" value="1" class="slider" oninput="setTimeOpacity(this.value)">

                <p class="section-header">Wallpapers</p>
                <div class="chip-container">
                    <div class="chip" onclick="setWP('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b')">Alpine</div>
                    <div class="chip" onclick="setWP('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd')">Night</div>
                    <div class="chip" onclick="setWP('https://images.unsplash.com/photo-1506744038136-46273834b3fb')">Canyon</div>
                    <div class="chip" onclick="setWP('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05')">Forest</div>
                </div>

                <p class="section-header">Clock Fonts</p>
                <div class="chip-container">
                    <div class="chip" onclick="setFont('Vertex Clock')">Vertex</div>
                    <div class="chip" onclick="setFont('Space Grotesk')">Grotesk</div>
                    <div class="chip" onclick="setFont('Manrope')">Manrope</div>
                    <div class="chip" onclick="setFont('SF Pro Display')">SF</div>
                </div>
            </div>
        </div>
    </div>

    <div id="login-module">
        <div style="text-align:center">
            <div style="width:46px; height:46px; background:rgba(255,255,255,0.1); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(20px);">
                <img src="../../assets/branding/vertex-logo.png" alt="Vertex logo" style="width:28px;height:28px;object-fit:contain;">
            </div>
            <div class="pass-group" id="pass-wrap">
                <input type="password" id="pass-in" placeholder="Password" onkeydown="if(event.key === 'Enter') checkPass()">
                <button class="submit-btn" onclick="checkPass()" aria-label="Submit password">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 12h13"></path>
                        <path d="M13 6l6 6-6 6"></path>
                    </svg>
                </button>
            </div>
            <p onclick="hideLogin()" style="margin-top:20px; opacity:0.4; cursor:pointer;">Cancel</p>
        </div>
    </div>

    <script>
        let hintIdx = 0;
        const hints = ["Click anywhere to unlock", "Press Enter to unlock", "Hold anywhere to personalize"];
        document.addEventListener('DOMContentLoaded', () => {
            const bootScreen = document.getElementById('boot-screen');
            const wallpaper = document.getElementById('wp-cont');

            setTimeout(() => bootScreen.classList.add('logo-phase'), 120);
            setTimeout(() => {
                bootScreen.classList.remove('logo-phase');
                bootScreen.classList.add('spinner-phase');
            }, 40000);
            setTimeout(() => {
                bootScreen.style.opacity = '0';
                wallpaper.classList.add('wp-ready');
                document.body.classList.add('lock-ready');
                setTimeout(playBootRevealSound, 140);
                setTimeout(() => bootScreen.style.display = 'none', 500);
            }, 50000);

            updateClock();
            setInterval(updateClock, 1000);
            initGestures();
            initBatteryWidget();

            // Hint Swap
            const hintEl = document.getElementById('hint-text');
            setInterval(() => {
                hintEl.classList.remove('msg-active');
                setTimeout(() => {
                    hintIdx = (hintIdx + 1) % hints.length;
                    hintEl.innerText = hints[hintIdx];
                    hintEl.classList.add('msg-active');
                }, 800);
            }, 4000);
            hintEl.classList.add('msg-active');
        });

        function playBootRevealSound() {
            if (window.__vertexBootRevealSoundPlayed) return;
            window.__vertexBootRevealSoundPlayed = true;

            const AudioEngine = window.AudioContext || window.webkitAudioContext;
            if (!AudioEngine) return;

            try {
                const ctx = new AudioEngine({ latencyHint: 'interactive' });
                const start = ctx.currentTime + 0.02;
                const master = ctx.createGain();
                const filter = ctx.createBiquadFilter();

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(5200, start);
                filter.Q.setValueAtTime(0.2, start);
                master.gain.setValueAtTime(0.0001, start);
                master.gain.exponentialRampToValueAtTime(0.11, start + 0.05);
                master.gain.exponentialRampToValueAtTime(0.0001, start + 0.82);
                filter.connect(master);
                master.connect(ctx.destination);

                [
                    { frequency: 392.0, delay: 0.00, duration: 0.34, gain: 0.34 },
                    { frequency: 587.33, delay: 0.07, duration: 0.42, gain: 0.24 },
                    { frequency: 783.99, delay: 0.16, duration: 0.48, gain: 0.16 }
                ].forEach((voice) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    const t = start + voice.delay;

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(voice.frequency, t);
                    gain.gain.setValueAtTime(0.0001, t);
                    gain.gain.exponentialRampToValueAtTime(voice.gain, t + 0.035);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + voice.duration);
                    osc.connect(gain);
                    gain.connect(filter);
                    osc.start(t);
                    osc.stop(t + voice.duration + 0.05);
                });

                if (ctx.state === 'suspended') {
                    ctx.resume().catch(() => {});
                }
                setTimeout(() => ctx.close().catch(() => {}), 1200);
            } catch (_) {
                window.__vertexBootRevealSoundPlayed = false;
            }
        }

        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const date = new Intl.DateTimeFormat(undefined, {
                weekday: 'long',
                month: 'long',
                day: 'numeric'
            }).format(now);
            document.getElementById('time-text').innerText = time;
            document.getElementById('date-text').innerText = date;

            const previewTime = document.getElementById('preview-time');
            const previewDate = document.getElementById('preview-date');
            if (previewTime) previewTime.innerText = time;
            if (previewDate) previewDate.innerText = date;
        }

        function initGestures() {
            let pTimer;
            let pressStarted = 0;
            const isLockSurface = (e) => {
                if (e.target.closest('.system-widgets') || e.target.closest('#custom-window') || e.target.closest('#login-module')) return false;
                return e.target.id === 'wp-cont' || e.target.closest('#ui-main') || e.target.closest('.bottom-shelf');
            };

            window.addEventListener('pointerdown', (e) => {
                if (isLockSurface(e)) {
                    pressStarted = Date.now();
                    pTimer = setTimeout(openPanel, 900);
                }
            });
            window.addEventListener('pointerup', () => clearTimeout(pTimer));
            window.addEventListener('pointercancel', () => clearTimeout(pTimer));
            window.addEventListener('click', (e) => {
                if (!isLockSurface(e)) return;
                if (Date.now() - pressStarted > 850) return;
                if (!document.getElementById('custom-overlay').classList.contains('active')) {
                    showLogin();
                }
            });
            window.addEventListener('keydown', (e) => {
                const customOpen = document.getElementById('custom-overlay').classList.contains('active');
                const loginOpen = document.getElementById('login-module').classList.contains('active');
                if (e.key === 'Escape' && customOpen) closePanel();
                if (e.key === 'Enter' && !customOpen && !loginOpen) showLogin();
            });
        }

        function openPanel() {
            document.getElementById('custom-overlay').classList.add('active');
            document.getElementById('wp-cont').classList.add('wp-lock-blur');
        }
        function closePanel() {
            document.getElementById('custom-overlay').classList.remove('active');
            document.getElementById('wp-cont').classList.remove('wp-lock-blur');
        }

        function setFont(f) {
            document.getElementById('time-text').style.fontFamily = f;
            const previewTime = document.getElementById('preview-time');
            if (previewTime) previewTime.style.fontFamily = f;
        }
        function setWP(url) { document.documentElement.style.setProperty('--bg', `url('${url}')`); }
        function setTimeOpacity(val) { document.documentElement.style.setProperty('--time-opacity', val); }
        function toggleAccessibility(button) {
            document.body.classList.toggle('accessibility-boost');
            if (button) button.classList.toggle('active', document.body.classList.contains('accessibility-boost'));
        }

        function initBatteryWidget() {
            const fill = document.getElementById('battery-fill');
            if (!fill) return;

            const setLevel = (level) => {
                const percent = Math.max(8, Math.min(100, Math.round(level * 100)));
                fill.style.setProperty('--battery-level', `${percent}%`);
            };

            setLevel(0.72);
            if (!navigator.getBattery) return;

            navigator.getBattery().then((battery) => {
                const update = () => setLevel(battery.level);
                update();
                battery.addEventListener('levelchange', update);
                battery.addEventListener('chargingchange', update);
            }).catch(() => {});
        }

        function showLogin() {
            document.getElementById('wp-cont').classList.add('wp-lock-blur');
            document.getElementById('login-module').classList.add('active');
        }
        function hideLogin() {
            document.getElementById('wp-cont').classList.remove('wp-lock-blur');
            document.getElementById('login-module').classList.remove('active');
        }

        function checkPass() {
            const wrap = document.getElementById('pass-wrap');
            const input = document.getElementById('pass-in');
            if(input.value === "1234") {
                hideLogin();
                alert("Welcome Zarif!");
            } else {
                wrap.classList.add('error-shake');
                setTimeout(() => wrap.classList.remove('error-shake'), 400);
                input.value = "";
            }
        }
    </script>
</body>
</html>
