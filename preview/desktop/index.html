<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VertexOS Boot</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            display: grid;
            place-items: center;
        }

        .boot-logo {
            position: relative;
            width: min(42vw, 420px);
            aspect-ratio: 1;
            display: grid;
            place-items: center;
            overflow: hidden;
            filter:
                drop-shadow(0 24px 70px rgba(255, 255, 255, 0.08))
                drop-shadow(0 12px 42px rgba(0, 0, 0, 0.65));
        }

        .boot-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.96;
        }

        .boot-logo::after {
            content: "";
            position: absolute;
            inset: -32%;
            background: linear-gradient(
                110deg,
                transparent 32%,
                rgba(255, 255, 255, 0.08) 43%,
                rgba(255, 255, 255, 0.72) 50%,
                rgba(255, 255, 255, 0.10) 57%,
                transparent 68%
            );
            transform: translateX(-120%) rotate(8deg);
            mix-blend-mode: screen;
            animation: logoShine 2.6s cubic-bezier(0.19, 1, 0.22, 1) infinite;
            pointer-events: none;
        }

        @keyframes logoShine {
            0% {
                transform: translateX(-120%) rotate(8deg);
                opacity: 0;
            }

            18% {
                opacity: 1;
            }

            52% {
                opacity: 1;
            }

            78%,
            100% {
                transform: translateX(120%) rotate(8deg);
                opacity: 0;
            }
        }

        @media (max-width: 700px) {
            .boot-logo {
                width: min(58vw, 280px);
            }
        }
    </style>
</head>
<body>
    <main class="boot-logo" aria-label="VertexOS boot logo">
        <img src="../../assets/branding/vertex-logo.png" alt="VertexOS">
    </main>
</body>
</html>
